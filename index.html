<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Multimodal Live AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/framer-motion/11.0.8/framer-motion.js"></script>
    <style>
        :root {
            --neon-cyan: #00f3ff;
            --neon-violet: #bc13fe;
            --dark-bg: #0a0a0c;
        }
        body {
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .glow-cyan { box-shadow: 0 0 20px rgba(0, 243, 255, 0.2); }
        .glow-pulse {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: .7; transform: scale(1.05); }
        }
        canvas { width: 100%; height: 200px; }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">

    <!-- API Key Modal -->
    <div id="setup-modal" class="fixed inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-sm">
        <div class="glass p-8 rounded-2xl w-full max-w-md glow-cyan">
            <h2 class="text-2xl font-bold mb-4 bg-gradient-to-r from-cyan-400 to-violet-500 bg-clip-text text-transparent">
                Gemini Live Setup
            </h2>
            <p class="text-gray-400 mb-6 text-sm">Enter your Gemini API Key to start the real-time session.</p>
            <input type="password" id="api-key" placeholder="AIza..." 
                class="w-full bg-black/50 border border-white/10 rounded-lg p-3 mb-6 focus:outline-none focus:border-cyan-500 transition-colors">
            <button onclick="saveKeyAndContinue()" 
                class="w-full bg-gradient-to-r from-cyan-500 to-violet-600 p-3 rounded-lg font-bold hover:opacity-90 transition-opacity">
                Initialize Connection
            </button>
        </div>
    </div>

    <!-- Main UI -->
    <main class="w-full max-w-4xl flex flex-col items-center">
        <header class="mb-12 text-center">
            <h1 class="text-4xl font-black tracking-tighter mb-2">GEMINI <span class="text-cyan-400">LIVE</span></h1>
            <div id="status-tag" class="text-xs uppercase tracking-widest text-gray-500 flex items-center gap-2 justify-center">
                <span id="status-dot" class="w-2 h-2 rounded-full bg-red-500"></span>
                <span id="status-text">Disconnected</span>
            </div>
        </header>

        <!-- Visualizer Area -->
        <div class="relative w-full aspect-video glass rounded-3xl overflow-hidden flex items-center justify-center mb-8">
            <canvas id="visualizer"></canvas>
            <div id="ai-active-ring" class="absolute w-48 h-48 rounded-full border-2 border-cyan-500/30 hidden"></div>
        </div>

        <!-- Controls -->
        <div class="flex gap-6">
            <button id="start-btn" onclick="startSession()" 
                class="glass px-8 py-4 rounded-full font-bold text-cyan-400 hover:bg-cyan-500/10 transition-all flex items-center gap-3">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></svg>
                Connect
            </button>
            <button id="stop-btn" onclick="stopSession()" disabled 
                class="glass px-8 py-4 rounded-full font-bold text-red-400 opacity-50 cursor-not-allowed hover:bg-red-500/10 transition-all flex items-center gap-3">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/></svg>
                Disconnect
            </button>
        </div>
    </main>

    <script>
        /**
         * CONFIGURATION & STATE
         */
        const MODEL = "gemini-2.0-flash-exp";
        const URL = `wss://generativelanguage.googleapis.com/ws/google.ai.generativelanguage.v1alpha.GenerativeService.BiDiGenerateContent`;
        
        let ws = null;
        let audioContext = null;
        let audioWorkletNode = null;
        let microphoneStream = null;
        let pcmPlayer = null;
        let isConnected = false;

        // UI Elements
        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');
        const startBtn = document.getElementById('start-btn');
        const stopBtn = document.getElementById('stop-btn');
        const canvas = document.getElementById('visualizer');
        const ctx = canvas.getContext('2d');

        /**
         * AUDIO PROCESSING LOGIC
         */
        class PCMPlayer {
            constructor() {
                this.audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 24000 });
                this.nextStartTime = this.audioContext.currentTime;
            }

            async playChunk(base64Audio) {
                const binary = atob(base64Audio);
                const bytes = new Uint8Array(binary.length);
                for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
                
                const pcmData = new Int16Array(bytes.buffer);
                const float32Data = new Float32Array(pcmData.length);
                for (let i = 0; i < pcmData.length; i++) float32Data[i] = pcmData[i] / 32768.0;

                const buffer = this.audioContext.createBuffer(1, float32Data.length, 24000);
                buffer.copyToChannel(float32Data, 0);

                const source = this.audioContext.createBufferSource();
                source.buffer = buffer;
                source.connect(this.audioContext.destination);
                
                const startTime = Math.max(this.nextStartTime, this.audioContext.currentTime);
                source.start(startTime);
                this.nextStartTime = startTime + buffer.duration;
            }

            stop() {
                this.audioContext.close();
            }
        }

        /**
         * WEBSOCKET & SESSION MANAGEMENT
         */
        function saveKeyAndContinue() {
            const key = document.getElementById('api-key').value;
            if (key) {
                sessionStorage.setItem('gemini_api_key', key);
                document.getElementById('setup-modal').classList.add('hidden');
            }
        }

        async function startSession() {
            const apiKey = sessionStorage.getItem('gemini_api_key');
            if (!apiKey) return alert("API Key missing");

            try {
                ws = new WebSocket(`${URL}?key=${apiKey}`);

                ws.onopen = () => {
                    console.log("WebSocket Connected");
                    const setupMessage = {
                        setup: { model: `models/${MODEL}` }
                    };
                    ws.send(JSON.stringify(setupMessage));
                    updateStatus(true);
                    startAudioCapture();
                };

                ws.onmessage = async (event) => {
                    const response = JSON.parse(await event.data.text());
                    
                    if (response.serverContent?.modelTurn?.parts?.[0]?.inlineData) {
                        const audioData = response.serverContent.modelTurn.parts[0].inlineData.data;
                        if (!pcmPlayer) pcmPlayer = new PCMPlayer();
                        pcmPlayer.playChunk(audioData);
                        animateVisualizer(true);
                    }
                };

                ws.onerror = (err) => console.error("WS Error:", err);
                ws.onclose = () => stopSession();

            } catch (err) {
                console.error("Session start failed:", err);
            }
        }

        async function startAudioCapture() {
            microphoneStream = await navigator.mediaDevices.getUserMedia({ audio: { 
                sampleRate: 16000,
                channelCount: 1,
                echoCancellation: true 
            }});
            
            audioContext = new AudioContext({ sampleRate: 16000 });
            const source = audioContext.createMediaStreamSource(microphoneStream);
            
            // Inline AudioWorklet Processor
            const workletCode = `
                class RecorderProcessor extends AudioWorkletProcessor {
                    process(inputs, outputs, parameters) {
                        const input = inputs[0];
                        if (input.length > 0) {
                            const pcmData = new Int16Array(input[0].length);
                            for (let i = 0; i < input[0].length; i++) {
                                pcmData[i] = Math.max(-1, Math.min(1, input[0][i])) * 0x7FFF;
                            }
                            this.port.postMessage(pcmData.buffer, [pcmData.buffer]);
                        }
                        return true;
                    }
                }
                registerProcessor('recorder-processor', RecorderProcessor);
            `;

            const blob = new Blob([workletCode], { type: 'application/javascript' });
            const workletUrl = URL.createObjectURL(blob);
            
            await audioContext.audioWorklet.addModule(workletUrl);
            audioWorkletNode = new AudioWorkletNode(audioContext, 'recorder-processor');
            
            audioWorkletNode.port.onmessage = (event) => {
                if (ws && ws.readyState === WebSocket.OPEN) {
                    const base64Audio = btoa(String.fromCharCode(...new Uint8Array(event.data)));
                    ws.send(JSON.stringify({
                        realtime_input: {
                            media_chunks: [{
                                mime_type: "audio/pcm;rate=16000",
                                data: base64Audio
                            }]
                        }
                    }));
                    animateVisualizer(false);
                }
            };

            source.connect(audioWorkletNode);
        }

        function stopSession() {
            if (ws) ws.close();
            if (microphoneStream) microphoneStream.getTracks().forEach(t => t.stop());
            if (audioContext) audioContext.close();
            if (pcmPlayer) pcmPlayer.stop();
            
            ws = null;
            pcmPlayer = null;
            updateStatus(false);
        }

        /**
         * UI & VISUALS
         */
        function updateStatus(connected) {
            isConnected = connected;
            statusDot.className = `w-2 h-2 rounded-full ${connected ? 'bg-cyan-500 shadow-[0_0_10px_#00f3ff]' : 'bg-red-500'}`;
            statusText.innerText = connected ? 'Live' : 'Disconnected';
            startBtn.disabled = connected;
            startBtn.className = `glass px-8 py-4 rounded-full font-bold text-cyan-400 flex items-center gap-3 transition-all ${connected ? 'opacity-50 cursor-not-allowed' : 'hover:bg-cyan-500/10'}`;
            stopBtn.disabled = !connected;
            stopBtn.className = `glass px-8 py-4 rounded-full font-bold text-red-400 flex items-center gap-3 transition-all ${!connected ? 'opacity-50 cursor-not-allowed' : 'hover:bg-red-500/10'}`;
        }

        // Simple Sine Wave Visualizer
        let offset = 0;
        function animateVisualizer(isAIPlaying) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.beginPath();
            ctx.lineWidth = 3;
            ctx.strokeStyle = isAIPlaying ? '#bc13fe' : '#00f3ff';

            for (let x = 0; x < canvas.width; x++) {
                const y = canvas.height / 2 + Math.sin(x * 0.02 + offset) * (isAIPlaying ? 40 : 20);
                if (x === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.stroke();
            offset += 0.1;
        }

        // Initialize Canvas size
        function resize() {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
        }
        window.onresize = resize;
        resize();

        // Check if key already exists
        if(sessionStorage.getItem('gemini_api_key')) {
            document.getElementById('setup-modal').classList.add('hidden');
        }
    </script>
</body>
</html>
