<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Live v2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --neon-cyan: #00f3ff; --dark-bg: #0a0a0c; }
        body { background-color: var(--dark-bg); color: white; font-family: sans-serif; overflow: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; transition: all 0.3s; }
        .status-disconnected { background: #ef4444; box-shadow: 0 0 10px #ef4444; }
        .status-connected { background: #10b981; box-shadow: 0 0 10px #10b981; }
        canvas { width: 100%; height: 150px; }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">

    <!-- API Key Modal -->
    <div id="setup-modal" class="fixed inset-0 z-50 flex items-center justify-center bg-black/90 backdrop-blur-md">
        <div class="glass p-8 rounded-2xl w-full max-w-md">
            <h2 class="text-2xl font-bold mb-4 text-cyan-400">Gemini Live Config</h2>
            <input type="password" id="api-key" placeholder="Enter Gemini API Key (AIza...)" 
                class="w-full bg-white/5 border border-white/10 rounded-lg p-3 mb-6 focus:outline-none focus:border-cyan-500">
            <button onclick="saveKey()" class="w-full bg-cyan-600 p-3 rounded-lg font-bold hover:bg-cyan-500 transition-all">
                Access Laboratory
            </button>
        </div>
    </div>

    <!-- Interface -->
    <main class="w-full max-w-2xl text-center">
        <div class="mb-8">
            <h1 class="text-3xl font-bold tracking-tighter uppercase">Gemini <span class="text-cyan-500">Live API</span></h1>
            <p id="status-display" class="text-xs text-gray-500 mt-2">
                <span id="dot" class="status-dot status-disconnected mr-2"></span>
                <span id="status-text">DISCONNECTED</span>
            </p>
        </div>

        <div class="glass rounded-3xl p-6 mb-8 relative">
            <canvas id="canvas"></canvas>
            <div id="log-display" class="text-[10px] font-mono text-gray-500 mt-4 h-20 overflow-y-auto text-left border-t border-white/5 pt-2">
                System Ready...
            </div>
        </div>

        <div class="flex justify-center gap-4">
            <button id="btn-start" onclick="initSession()" class="bg-white text-black px-8 py-3 rounded-full font-bold hover:bg-cyan-400 transition-all">START SESSION</button>
            <button id="btn-stop" onclick="stopSession()" class="bg-red-900/20 text-red-500 border border-red-500/50 px-8 py-3 rounded-full font-bold hidden">STOP</button>
        </div>
        
        <button onclick="resetKey()" class="mt-8 text-[10px] text-gray-600 underline uppercase tracking-widest">Reset API Key</button>
    </main>

    <script>
        let ws = null;
        let audioCtx = null;
        let stream = null;
        let processor = null;
        let nextPlayTime = 0;

        const log = (msg) => {
            const el = document.getElementById('log-display');
            el.innerHTML += `<div>> ${msg}</div>`;
            el.scrollTop = el.scrollHeight;
            console.log(`[GeminiLive] ${msg}`);
        };

        function saveKey() {
            const key = document.getElementById('api-key').value;
            if(key) {
                sessionStorage.setItem('gemini_key', key);
                document.getElementById('setup-modal').style.display = 'none';
            }
        }

        function resetKey() {
            sessionStorage.removeItem('gemini_key');
            location.reload();
        }

        if(sessionStorage.getItem('gemini_key')) {
            document.getElementById('setup-modal').style.display = 'none';
        }

        async function initSession() {
            const API_KEY = sessionStorage.getItem('gemini_key');
            const URL = `wss://generativelanguage.googleapis.com/ws/google.ai.generativelanguage.v1alpha.GenerativeService.BiDiGenerateContent?key=${API_KEY}`;

            log("Attempting to connect...");
            
            ws = new WebSocket(URL);

            ws.onopen = () => {
                log("WebSocket Open. Sending Setup...");
                const setup = {
                    setup: { 
                        model: "models/gemini-2.0-flash-exp",
                        generation_config: { response_modalities: ["audio"] }
                    }
                };
                ws.send(JSON.stringify(setup));
                updateUI(true);
            };

            ws.onmessage = async (event) => {
                const data = JSON.parse(await event.data.text());
                
                // Handle Audio Response
                if (data.serverContent?.modelTurn?.parts?.[0]?.inlineData) {
                    const base64Audio = data.serverContent.modelTurn.parts[0].inlineData.data;
                    playAudioChunk(base64Audio);
                }

                if (data.setupComplete) {
                    log("Handshake Complete. Starting Mic...");
                    startMic();
                }
            };

            ws.onclose = (e) => {
                log(`Connection closed: ${e.reason || 'Unknown error'}`);
                stopSession();
            };

            ws.onerror = (e) => log("WebSocket Error occurred.");
        }

        async function startMic() {
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
                stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const source = audioCtx.createMediaStreamSource(stream);

                // Inline worker to handle PCM conversion
                const workerCode = `
                    class PCMProcessor extends AudioWorkletProcessor {
                        process(inputs) {
                            const input = inputs[0][0];
                            if (!input) return true;
                            const pcm = new Int16Array(input.length);
                            for (let i = 0; i < input.length; i++) {
                                pcm[i] = Math.max(-1, Math.min(1, input[i])) * 0x7FFF;
                            }
                            this.port.postMessage(pcm.buffer, [pcm.buffer]);
                            return true;
                        }
                    }
                    registerProcessor('pcm-processor', PCMProcessor);
                `;

                const blob = new Blob([workerCode], { type: 'application/javascript' });
                await audioCtx.audioWorklet.addModule(URL.createObjectURL(blob));
                
                processor = new AudioWorkletNode(audioCtx, 'pcm-processor');
                processor.port.onmessage = (e) => {
                    if (ws && ws.readyState === WebSocket.OPEN) {
                        const base64 = btoa(String.fromCharCode(...new Uint8Array(e.data)));
                        ws.send(JSON.stringify({
                            realtime_input: {
                                media_chunks: [{ mime_type: "audio/pcm;rate=16000", data: base64 }]
                            }
                        }));
                    }
                };

                source.connect(processor);
                log("Microphone streaming live.");
                drawWave();
            } catch (err) {
                log(`Mic Error: ${err.message}`);
            }
        }

        function playAudioChunk(base64) {
            if (!audioCtx) return;
            const arrayBuffer = Uint8Array.from(atob(base64), c => c.charCodeAt(0)).buffer;
            const pcm16 = new Int16Array(arrayBuffer);
            const float32 = new Float32Array(pcm16.length);
            for (let i = 0; i < pcm16.length; i++) float32[i] = pcm16[i] / 32768;

            const buffer = audioCtx.createBuffer(1, float32.length, 24000);
            buffer.copyToChannel(float32, 0);
            const source = audioCtx.createBufferSource();
            source.buffer = buffer;
            source.connect(audioCtx.destination);
            
            const start = Math.max(nextPlayTime, audioCtx.currentTime);
            source.start(start);
            nextPlayTime = start + buffer.duration;
        }

        function stopSession() {
            if (ws) ws.close();
            if (stream) stream.getTracks().forEach(t => t.stop());
            if (audioCtx) audioCtx.close();
            updateUI(false);
            log("Session Terminated.");
        }

        function updateUI(connected) {
            document.getElementById('btn-start').classList.toggle('hidden', connected);
            document.getElementById('btn-stop').classList.toggle('hidden', !connected);
            document.getElementById('dot').className = `status-dot ${connected ? 'status-connected' : 'status-disconnected'}`;
            document.getElementById('status-text').innerText = connected ? 'LIVE - SPEAK NOW' : 'DISCONNECTED';
        }

        // Simple Visualizer
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        function drawWave() {
            if(!ws) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.beginPath();
            ctx.strokeStyle = '#00f3ff';
            ctx.lineWidth = 2;
            ctx.moveTo(0, 75);
            for(let i=0; i<canvas.width; i++) {
                ctx.lineTo(i, 75 + Math.sin(i * 0.05 + Date.now() * 0.01) * 20);
            }
            ctx.stroke();
            requestAnimationFrame(drawWave);
        }
    </script>
</body>
</html>
